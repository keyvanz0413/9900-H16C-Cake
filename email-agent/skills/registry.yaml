# Skill registry template
# Each skill declares its own structured input contract.
#
# Example:
# skills:
#   - name: weekly_email_summary
#     description: Summarize recent inbox activity.
#     scope: Read-only summary of recent inbox activity.
#     used_tools:
#       - search_emails
#       - get_unanswered_emails
#     input_schema:
#       days:
#         type: int
#         required: false
#         default: 7
#         description: Number of recent days to summarize.
#       include_unanswered:
#         type: bool
#         required: false
#         default: true
#         description: Whether to include unanswered-thread context.
#     output: A concise weekly inbox summary.
skills:
  - name: unsubscribe_discovery
    description: Discover recent newsletter, marketing, or subscription emails and inspect their execution-ready unsubscribe options.
    scope: Read-only unsubscribe discovery workflow. Never sends email, never posts unsubscribe requests, never opens websites, never runs browser automation, and never modifies mailbox state.
    used_tools:
      - search_emails
      - get_unsubscribe_info
    input_schema:
      days:
        type: int
        required: false
        default: 30
        description: Number of recent days to inspect for likely subscription emails, capped at 90.
      max_results:
        type: int
        required: false
        default: 100
        description: Maximum number of recent email search results to inspect, capped at 250.
    output: A read-only unsubscribe candidate list grouped by sender or domain with execution-ready unsubscribe classifications such as one_click, mailto, website, or unknown.
  - name: unsubscribe_execute
    description: Execute unsubscribe for one or more explicit subscription targets. Prefer candidates chosen from the current subscription list when available, otherwise run targeted mailbox discovery for unresolved targets before executing only those targets.
    scope: Multi-target unsubscribe workflow. It may use candidates selected from the current subscription list or fall back to targeted mailbox discovery per unresolved target. Supports RFC 8058 one-click POST and mailto request sending. Does not open websites, does not run browser automation, and does not archive, delete, label, or otherwise modify existing mailbox messages.
    used_tools:
      - search_emails
      - get_unsubscribe_info
      - post_one_click_unsubscribe
      - send
    resolver_guidance: For unsubscribe_execute, first inspect any current subscription list present in read_results or recent_context. Return target_queries as a JSON array covering every explicit sender, brand, or subscription target the user wants unsubscribed in this turn. If the current subscription list lets you identify exact candidate ids for one or more targets, return those in candidate_ids as a JSON array. If no reliable candidate id is available for a target, leave it out of candidate_ids. Runtime will not resolve raw target_queries against the current list; unresolved targets fall through to targeted discovery instead.
    input_schema:
      target_queries:
        type: list
        required: true
        description: One or more explicit sender, brand, domain, or other subscription targets the user wants unsubscribed in this turn.
      candidate_ids:
        type: list
        required: false
        default: []
        description: Optional candidate identifiers recovered from the current subscription list for any targets that can be matched reliably before execution.
      days:
        type: int
        required: false
        default: 30
        description: Number of recent days to inspect when targeted mailbox discovery is needed for unresolved unsubscribe targets.
      max_results:
        type: int
        required: false
        default: 100
        description: Maximum number of matching emails to inspect before grouping them into unsubscribe candidates for each targeted discovery search.
      method:
        type: string
        required: false
        default: auto
        description: Execution method override for the resolved target candidates. Use auto unless the user explicitly selects one_click, mailto, or website.
    output: A multi-target unsubscribe execution result grounded in the current visible subscription list plus any fallback targeted mailbox discovery, with separate categories for newly unsubscribed targets, already unsubscribed targets, manual-action-required targets, failed targets, and not-found targets.
  - name: weekly_email_summary
    description: Summarize recent email activity for a recent time window using mailbox identity, inbox, unanswered, and calendar context.
    scope: Read-only weekly summary workflow. Never send email and never modify mailbox state.
    used_tools:
      - get_my_identity
      - search_emails
      - get_unanswered_emails
      - list_events
    input_schema:
      days:
        type: int
        required: false
        default: 7
        description: Number of recent days to summarize.
    output: A user-facing weekly email summary grounded only in the collected identity, inbox, unanswered, and calendar tool results.
  - name: writing_style_profile
    description: Build or update a persistent writing style profile from the user's recent sent emails.
    scope: Read recent sent emails and update the local writing style markdown only. Never send email and never modify mailbox state beyond WRITING_STYLE.md.
    used_tools:
      - get_sent_emails
    output: A user-facing confirmation plus the updated WRITING_STYLE markdown derived from recent sent emails.
  - name: urgent_email_triage
    description: Find recent inbox emails that look urgent, need attention, or appear high-priority, add unanswered-thread context, and fetch full bodies for both matched urgent emails and unresolved unanswered emails.
    scope: Read-only urgent-email triage workflow. Never send email and never modify mailbox state.
    used_tools:
      - search_emails
      - get_unanswered_emails
      - get_email_body
    input_schema:
      days:
        type: int
        required: false
        default: 7
        description: Number of recent days to inspect for urgent, attention-needed, or high-priority emails, capped at 7.
    output: A user-facing triage of recent inbox emails that look urgent, need attention, or appear high-priority, grounded only in keyword search hits, unanswered-thread context, and the fetched full bodies of matched urgent and unresolved unanswered emails.
  - name: bug_issue_triage
    description: Find recent inbox emails, notifications, or task-record messages that look bug-related, such as build failures, issue openings, failing tests, regressions, incidents, or broken workflows, and fetch the full body of every matched email.
    scope: Read-only bug triage workflow. Never send email and never modify mailbox state.
    used_tools:
      - search_emails
      - get_email_body
    input_schema:
      days:
        type: int
        required: false
        default: 7
        description: Number of recent days to inspect for bug-related or engineering-problem emails, capped at 7.
    output: A user-facing prioritized bug triage grounded only in keyword search hits and the fetched full bodies of every matched email.
  - name: resume_candidate_review
    description: Find candidate, application, or resume-related emails, prefer explicit candidate targets or prior step results when available, separate primary candidate hits from thread-context follow-ups, and pass relevant extracted attachment text through for structured candidate summaries.
    scope: Read-only resume and candidate review workflow. Never send email and never modify mailbox state.
    used_tools:
      - search_emails
      - get_email_attachments
      - extract_recent_attachment_texts
    resolver_guidance: For resume_candidate_review, prefer explicit carryover from read_results or recent_context. If prior step results already contain matched candidate email ids, return them in email_ids. If the user names candidates or refers to a previously found candidate thread, recover candidate_names or a narrow query instead of defaulting to a fresh recent scan. Treat sent follow-ups such as asking for an English resume as thread context for the same candidate rather than a new candidate hit.
    input_schema:
      days:
        type: int
        required: false
        default: 7
        description: Number of recent days to inspect in fallback recent-scan mode, capped at 7.
      query:
        type: string
        required: false
        description: Optional narrow mailbox query for a specific candidate, sender, subject, or application thread.
      candidate_names:
        type: list
        required: false
        default: []
        description: Optional candidate names recovered from context when exact email ids are unavailable.
      email_ids:
        type: list
        required: false
        default: []
        description: Optional explicit candidate email ids recovered from prior step results or recent context.
      mailbox_scope:
        type: string
        required: false
        default: inbox
        description: Mailbox scope for search-based modes. Use inbox by default, or all when a targeted flow should include sent or copied thread context.
    output: A user-facing structured candidate review grounded only in the resolved candidate targets, attachment listings, thread-context classification, and any extracted attachment text from primary candidate emails.
  - name: draft_reply_from_email_context
    description: Locate a target email either by unanswered-message rank or by a mailbox search query, then fetch the target email body so the outer layer can draft a reply.
    scope: Draft-only reply workflow. Never send email and never modify mailbox state.
    used_tools:
      - search_emails
      - get_unanswered_emails
      - get_email_body
    input_schema:
      selection_mode:
        type: string
        required: true
        description: How to locate the target email. Use unanswered_rank for "latest/second unanswered email" requests, or search_query for requests anchored by a person, topic, subject, or other mailbox clue.
      target_rank:
        type: int
        required: false
        default: 1
        description: 1-based rank used only when selection_mode is unanswered_rank. 1 means the latest unanswered email, 2 means the second latest unanswered email, and so on.
      query:
        type: string
        required: false
        description: Mailbox search fragment used only when selection_mode is search_query, for example from:alice@example.com OR to:alice@example.com, subject:"deadline", or security alert.
      days:
        type: int
        required: false
        default: 30
        description: Search lookback window used only when selection_mode is search_query, capped at 30.
    output: A user-facing reply draft grounded only in the located target email, the associated mailbox search results, and the fetched full email body.
  - name: send_prepared_email
    description: Send an already-finalized email when the recipient, subject, and full body are already explicit in the current message or recent conversation context.
    scope: Send-only prepared-email workflow. Use only when the email content is already finalized. Never revise, expand, draft, or infer missing email content inside this skill.
    used_tools:
      - send
    input_schema:
      to:
        type: string
        required: true
        description: Final recipient email address for the email that should be sent now.
      subject:
        type: string
        required: true
        description: Final subject line for the email that should be sent now.
      body:
        type: string
        required: true
        description: Final plain-text email body that should be sent now.
      cc:
        type: string
        required: false
        description: Optional comma-separated CC recipients if they are already explicitly provided in context.
      bcc:
        type: string
        required: false
        description: Optional comma-separated BCC recipients if they are already explicitly provided in context.
    output: A user-facing confirmation grounded only in the direct send result and the finalized email fields that were sent.
