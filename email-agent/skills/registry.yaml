# Skill registry template
# Each skill declares its own structured input contract.
#
# Example:
# skills:
#   - name: weekly_email_summary
#     description: Summarize recent inbox activity.
#     scope: Read-only summary of recent inbox activity.
#     used_tools:
#       - search_emails
#       - get_unanswered_emails
#     input_schema:
#       days:
#         type: int
#         required: false
#         default: 7
#         description: Number of recent days to summarize.
#       include_unanswered:
#         type: bool
#         required: false
#         default: true
#         description: Whether to include unanswered-thread context.
#     output: A concise weekly inbox summary.
skills:
  - name: unsubscribe_discovery
    description: Discover recent newsletter, marketing, or subscription emails and classify their unsubscribe mechanism from message headers.
    scope: Read-only unsubscribe discovery workflow. Never sends email, never posts unsubscribe requests, never opens websites, never runs browser automation, and never modifies mailbox state.
    used_tools:
      - search_emails
      - get_email_headers
      - parse_list_unsubscribe_header
      - classify_unsubscribe_method
    input_schema:
      days:
        type: int
        required: false
        default: 30
        description: Number of recent days to inspect for likely subscription emails, capped at 90.
      max_results:
        type: int
        required: false
        default: 100
        description: Maximum number of recent email search results to inspect, capped at 250.
      include_body_links:
        type: bool
        required: false
        default: false
        description: Reserved for a later version; the first version classifies only header-based unsubscribe metadata.
    output: A read-only unsubscribe candidate list grouped by sender/domain with method classifications one_click, mailto, website, multiple, or unknown.
  - name: unsubscribe_execute
    description: Execute a user-confirmed unsubscribe action for one specific Gmail message by re-reading its unsubscribe headers and using one_click or mailto when available.
    scope: Performs one explicit unsubscribe action only when confirmed=true. Supports RFC 8058 one-click POST and mailto request sending. Does not open websites, does not run browser automation, and does not archive, delete, label, or otherwise modify existing mailbox messages.
    used_tools:
      - get_email_headers
      - parse_list_unsubscribe_header
      - classify_unsubscribe_method
      - post_one_click_unsubscribe
      - parse_mailto_url
      - send
    input_schema:
      email_id:
        type: string
        required: true
        description: Gmail message id for the representative email to unsubscribe from.
      method:
        type: string
        required: false
        default: auto
        description: Execution method. Use auto unless the user explicitly selects one_click, mailto, or website.
      confirmed:
        type: bool
        required: false
        default: false
        description: Must be true only when the user explicitly confirms executing the unsubscribe action.
    output: An unsubscribe execution result with status confirmed, request_sent, manual_required, failed, or uncertain, grounded in re-read message headers and the execution tool result.
  - name: weekly_email_summary
    description: Summarize recent email activity for a recent time window using mailbox identity, inbox, unanswered, and calendar context.
    scope: Read-only weekly summary workflow. Never send email and never modify mailbox state.
    used_tools:
      - get_my_identity
      - search_emails
      - get_unanswered_emails
      - list_events
    input_schema:
      days:
        type: int
        required: false
        default: 7
        description: Number of recent days to summarize.
    output: A user-facing weekly email summary grounded only in the collected identity, inbox, unanswered, and calendar tool results.
  - name: writing_style_profile
    description: Build or update a persistent writing style profile from the user's recent sent emails.
    scope: Read recent sent emails and update the local writing style markdown only. Never send email and never modify mailbox state beyond WRITING_STYLE.md.
    used_tools:
      - get_sent_emails
    output: A user-facing confirmation plus the updated WRITING_STYLE markdown derived from recent sent emails.
  - name: urgent_email_triage
    description: Find recent inbox emails that look urgent, need attention, or appear high-priority, add unanswered-thread context, and fetch full bodies for both matched urgent emails and unresolved unanswered emails.
    scope: Read-only urgent-email triage workflow. Never send email and never modify mailbox state.
    used_tools:
      - search_emails
      - get_unanswered_emails
      - get_email_body
    input_schema:
      days:
        type: int
        required: false
        default: 7
        description: Number of recent days to inspect for urgent, attention-needed, or high-priority emails, capped at 7.
    output: A user-facing triage of recent inbox emails that look urgent, need attention, or appear high-priority, grounded only in keyword search hits, unanswered-thread context, and the fetched full bodies of matched urgent and unresolved unanswered emails.
  - name: bug_issue_triage
    description: Find recent inbox emails, notifications, or task-record messages that look bug-related, such as build failures, issue openings, failing tests, regressions, incidents, or broken workflows, and fetch the full body of every matched email.
    scope: Read-only bug triage workflow. Never send email and never modify mailbox state.
    used_tools:
      - search_emails
      - get_email_body
    input_schema:
      days:
        type: int
        required: false
        default: 7
        description: Number of recent days to inspect for bug-related or engineering-problem emails, capped at 7.
    output: A user-facing prioritized bug triage grounded only in keyword search hits and the fetched full bodies of every matched email.
  - name: resume_candidate_review
    description: Find recent candidate, application, or resume-related inbox emails, inspect whether they include attachments, and pass relevant extracted attachment text through to the external finalizer for structured candidate summaries.
    scope: Read-only resume and candidate review workflow. Never send email and never modify mailbox state.
    used_tools:
      - search_emails
      - get_email_attachments
      - extract_recent_attachment_texts
    input_schema:
      days:
        type: int
        required: false
        default: 7
        description: Number of recent days to inspect for candidate, application, or resume-related emails, capped at 7.
    output: A user-facing structured candidate review grounded only in the search hits, attachment listings, and any extracted attachment text from matched candidate emails.
  - name: draft_reply_from_email_context
    description: Locate a target email either by unanswered-message rank or by a mailbox search query, then fetch the target email body so the outer layer can draft a reply.
    scope: Draft-only reply workflow. Never send email and never modify mailbox state.
    used_tools:
      - search_emails
      - get_unanswered_emails
      - get_email_body
    input_schema:
      selection_mode:
        type: string
        required: true
        description: How to locate the target email. Use unanswered_rank for "latest/second unanswered email" requests, or search_query for requests anchored by a person, topic, subject, or other mailbox clue.
      target_rank:
        type: int
        required: false
        default: 1
        description: 1-based rank used only when selection_mode is unanswered_rank. 1 means the latest unanswered email, 2 means the second latest unanswered email, and so on.
      query:
        type: string
        required: false
        description: Mailbox search fragment used only when selection_mode is search_query, for example from:alice@example.com OR to:alice@example.com, subject:"deadline", or security alert.
      days:
        type: int
        required: false
        default: 30
        description: Search lookback window used only when selection_mode is search_query, capped at 30.
    output: A user-facing reply draft grounded only in the located target email, the associated mailbox search results, and the fetched full email body.
