name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  oo-chat:
    name: oo-chat
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: oo-chat
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          # npm cache keys are lockfile-based; oo-chat does not currently commit one.
          package-manager-cache: false

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  email-agent:
    name: email-agent
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: email-agent
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          working-directory: email-agent
          enable-cache: true
          cache-dependency-glob: |
            email-agent/pyproject.toml
            email-agent/uv.lock

      - name: Install backend dependencies
        run: uv sync --locked --extra dev

      - name: Run backend tests
        env:
          OPENONION_API_KEY: ci-dummy-key
          OPENAI_API_KEY: ci-dummy-key
          AGENT_MODEL: gpt-4o-mini
          GOOGLE_SCOPES: "https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.send"
          GOOGLE_ACCESS_TOKEN: ci-dummy
          GOOGLE_REFRESH_TOKEN: ci-dummy
          LINKED_GMAIL: "true"
          LINKED_OUTLOOK: "false"
        run: uv run pytest tests -m "not real_api"
